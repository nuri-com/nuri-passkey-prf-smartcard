<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nuri Passkey PRF Test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17191c;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 18px;
        color: #4d5562;
        line-height: 1.5;
      }

      section {
        border-top: 1px solid #d9dee7;
        padding: 22px 0;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-size: 13px;
        font-weight: 650;
      }

      input,
      select {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #c9d0db;
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
        background: #ffffff;
        color: #17191c;
      }

      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 14px;
      }

      .buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: 1px solid #1e293b;
        border-radius: 6px;
        padding: 10px 14px;
        font: inherit;
        font-weight: 650;
        background: #1e293b;
        color: #ffffff;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: #1e293b;
      }

      pre {
        overflow: auto;
        min-height: 220px;
        border: 1px solid #d9dee7;
        border-radius: 6px;
        padding: 14px;
        background: #ffffff;
        color: #17191c;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .status {
        margin-top: 12px;
        font-weight: 650;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #111418;
          color: #f4f6f8;
        }

        p {
          color: #b8c0cc;
        }

        section,
        pre,
        input {
          border-color: #333b47;
        }

        input,
        select,
        pre {
          background: #171b21;
          color: #f4f6f8;
        }

        button.secondary {
          border-color: #c8d0dc;
          color: #f4f6f8;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Nuri Passkey PRF Test</h1>
      <p>
        Localhost WebAuthn smoke test for passkey authentication plus the PRF extension. It works
        only with authenticators your browser exposes to WebAuthn.
      </p>

      <section>
        <label for="username">Username</label>
        <input id="username" autocomplete="username" value="nuri-local-test" />

        <label for="salt1">PRF first input</label>
        <input id="salt1" value="nuri browser prf first input" />

        <label for="salt2">PRF second input</label>
        <input id="salt2" value="nuri browser prf second input" />

        <div class="control-grid">
          <div>
            <label for="authenticatorAttachment">Authenticator</label>
            <select id="authenticatorAttachment">
              <option value="cross-platform" selected>cross-platform</option>
              <option value="">any</option>
              <option value="platform">platform</option>
            </select>
          </div>
          <div>
            <label for="userVerification">User verification</label>
            <select id="userVerification">
              <option value="discouraged" selected>discouraged</option>
              <option value="preferred">preferred</option>
              <option value="required">required</option>
            </select>
          </div>
          <div>
            <label for="residentKey">Resident key</label>
            <select id="residentKey">
              <option value="required" selected>required</option>
              <option value="preferred">preferred</option>
              <option value="discouraged">discouraged</option>
            </select>
          </div>
          <div>
            <label for="prfMode">PRF input mode</label>
            <select id="prfMode">
              <option value="eval" selected>eval</option>
              <option value="evalByCredential">evalByCredential</option>
            </select>
          </div>
        </div>

        <div class="buttons">
          <button id="register">Register Passkey</button>
          <button id="authenticate">Authenticate + PRF</button>
          <button id="clear" class="secondary">Clear Local Credential</button>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section>
        <pre id="output">Ready.</pre>
      </section>
    </main>

    <script>
      const rpName = 'Nuri Local PRF Test';
      const storageKey = 'nuri.passkeyPrf.credential';
      const output = document.querySelector('#output');
      const status = document.querySelector('#status');

      function randomBytes(length) {
        const out = new Uint8Array(length);
        crypto.getRandomValues(out);
        return out;
      }

      function textBytes(value) {
        return new TextEncoder().encode(value);
      }

      function toBase64Url(bytes) {
        let binary = '';
        for (const byte of new Uint8Array(bytes)) binary += String.fromCharCode(byte);
        return btoa(binary).replaceAll('+', '-').replaceAll('/', '_').replaceAll('=', '');
      }

      function fromBase64Url(value) {
        const padded = `${value}${'='.repeat((4 - (value.length % 4)) % 4)}`;
        const binary = atob(padded.replaceAll('-', '+').replaceAll('_', '/'));
        const out = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) out[i] = binary.charCodeAt(i);
        return out;
      }

      function hex(buffer) {
        return [...new Uint8Array(buffer)].map((byte) => byte.toString(16).padStart(2, '0')).join('');
      }

      function getInputs() {
        return {
          username: document.querySelector('#username').value.trim() || 'nuri-local-test',
          salt1: textBytes(document.querySelector('#salt1').value),
          salt2: textBytes(document.querySelector('#salt2').value),
          userVerification: document.querySelector('#userVerification').value,
          residentKey: document.querySelector('#residentKey').value,
          prfMode: document.querySelector('#prfMode').value,
          authenticatorAttachment: document.querySelector('#authenticatorAttachment').value || undefined,
        };
      }

      function print(title, data) {
        output.textContent = `${title}\n${JSON.stringify(data, null, 2)}`;
      }

      function setStatus(message) {
        status.textContent = message;
      }

      async function register() {
        if (!window.PublicKeyCredential) throw new Error('WebAuthn is not available in this browser.');
        const { username, userVerification, residentKey, authenticatorAttachment } = getInputs();
        const userId = randomBytes(32);
        const publicKey = {
          challenge: randomBytes(32),
          rp: { name: rpName },
          user: {
            id: userId,
            name: username,
            displayName: username,
          },
          pubKeyCredParams: [
            { type: 'public-key', alg: -7 },
            { type: 'public-key', alg: -257 },
          ],
          authenticatorSelection: {
            ...(authenticatorAttachment ? { authenticatorAttachment } : {}),
            residentKey,
            requireResidentKey: residentKey === 'required',
            userVerification,
          },
          timeout: 120000,
          attestation: 'none',
          extensions: {
            prf: {},
          },
        };
        const capabilities = await getClientCapabilities();
        print('Registration request', {
          ...summarizeRequest(publicKey),
          browserCapabilities: capabilities,
        });
        const credential = await navigator.credentials.create({
          publicKey,
        });
        const extensionResults = credential.getClientExtensionResults();
        const authenticatorData = await registrationAuthenticatorData(credential.response);
        const request = summarizeRequest(publicKey);
        const saved = {
          id: credential.id,
          rawId: toBase64Url(credential.rawId),
          username,
          createdAt: new Date().toISOString(),
        };
        localStorage.setItem(storageKey, JSON.stringify(saved));
        setStatus('Registered.');
        print('Registration result', {
          credentialId: credential.id,
          type: credential.type,
          request,
          browserCapabilities: capabilities,
          prf: normalizePrf(extensionResults.prf),
          authenticatorData: authDataSummary(authenticatorData),
          transports: credential.response.getTransports ? credential.response.getTransports() : null,
          saved,
        });
      }

      async function authenticate() {
        if (!window.PublicKeyCredential) throw new Error('WebAuthn is not available in this browser.');
        const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
        if (!saved) throw new Error('Register a local passkey first.');
        const { salt1, salt2, userVerification, prfMode } = getInputs();
        const prfValues = { first: salt1, second: salt2 };
        const prf = prfMode === 'evalByCredential'
          ? { evalByCredential: { [saved.id]: prfValues } }
          : { eval: prfValues };
        const publicKey = {
          challenge: randomBytes(32),
          allowCredentials: [{ type: 'public-key', id: fromBase64Url(saved.rawId) }],
          userVerification,
          timeout: 120000,
          extensions: {
            prf,
          },
        };
        const capabilities = await getClientCapabilities();
        print('Authentication request', {
          ...summarizeRequest(publicKey),
          browserCapabilities: capabilities,
        });
        const assertion = await navigator.credentials.get({
          publicKey,
        });
        const extensionResults = assertion.getClientExtensionResults();
        const request = summarizeRequest(publicKey);
        setStatus('Authenticated.');
        print('Authentication + PRF result', {
          credentialId: assertion.id,
          request,
          browserCapabilities: capabilities,
          authenticatorDataBytes: assertion.response.authenticatorData.byteLength,
          authenticatorData: authDataSummary(assertion.response.authenticatorData),
          signatureBytes: assertion.response.signature.byteLength,
          prf: normalizePrf(extensionResults.prf),
        });
      }

      function normalizePrf(prf) {
        if (!prf) return null;
        const normalized = {};
        if ('enabled' in prf) normalized.enabled = prf.enabled;
        if (prf.results) {
          normalized.results = {};
          if (prf.results.first) normalized.results.firstHex = hex(prf.results.first);
          if (prf.results.second) normalized.results.secondHex = hex(prf.results.second);
        }
        return normalized;
      }

      async function getClientCapabilities() {
        if (!window.PublicKeyCredential) return { publicKeyCredential: false };
        if (typeof PublicKeyCredential.getClientCapabilities !== 'function') {
          return { publicKeyCredential: true, getClientCapabilities: false };
        }

        try {
          return await PublicKeyCredential.getClientCapabilities('public-key');
        } catch (error) {
          try {
            return await PublicKeyCredential.getClientCapabilities();
          } catch (fallbackError) {
            return {
              publicKeyCredential: true,
              getClientCapabilities: true,
              error: fallbackError.message || error.message,
            };
          }
        }
      }

      async function registrationAuthenticatorData(response) {
        if (typeof response.getAuthenticatorData === 'function') {
          return response.getAuthenticatorData();
        }
        return null;
      }

      function authDataSummary(buffer) {
        if (!buffer) return null;
        const bytes = new Uint8Array(buffer);
        if (bytes.byteLength < 37) return { byteLength: bytes.byteLength };
        const flags = bytes[32];
        const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
        return {
          byteLength: bytes.byteLength,
          flagsHex: `0x${flags.toString(16).padStart(2, '0')}`,
          flags: {
            userPresent: Boolean(flags & 0x01),
            userVerified: Boolean(flags & 0x04),
            backupEligible: Boolean(flags & 0x08),
            backupState: Boolean(flags & 0x10),
            attestedCredentialData: Boolean(flags & 0x40),
            extensionDataIncluded: Boolean(flags & 0x80),
          },
          signCount: view.getUint32(33, false),
        };
      }

      function summarizeRequest(publicKey) {
        return {
          origin: location.origin,
          rpId: publicKey.rp?.id || location.hostname,
          userVerification: publicKey.userVerification || publicKey.authenticatorSelection?.userVerification,
          authenticatorAttachment: publicKey.authenticatorSelection?.authenticatorAttachment,
          residentKey: publicKey.authenticatorSelection?.residentKey,
          requireResidentKey: publicKey.authenticatorSelection?.requireResidentKey,
          allowCredentials: publicKey.allowCredentials?.length || 0,
          prfRequested: Boolean(publicKey.extensions?.prf),
          prfMode: publicKey.extensions?.prf?.evalByCredential
            ? 'evalByCredential'
            : publicKey.extensions?.prf?.eval
              ? 'eval'
              : publicKey.extensions?.prf
                ? 'enableOnly'
                : null,
        };
      }

      document.querySelector('#register').addEventListener('click', () => {
        setStatus('Waiting for authenticator...');
        register().catch((error) => {
          setStatus('Registration failed.');
          print('Registration error', {
            name: error.name,
            message: error.message,
            userVerification: document.querySelector('#userVerification').value,
            authenticatorAttachment: document.querySelector('#authenticatorAttachment').value || 'any',
            residentKey: document.querySelector('#residentKey').value,
            prfMode: document.querySelector('#prfMode').value,
            origin: location.origin,
          });
        });
      });

      document.querySelector('#authenticate').addEventListener('click', () => {
        setStatus('Waiting for authenticator...');
        authenticate().catch((error) => {
          setStatus('Authentication failed.');
          print('Authentication error', {
            name: error.name,
            message: error.message,
            userVerification: document.querySelector('#userVerification').value,
            authenticatorAttachment: document.querySelector('#authenticatorAttachment').value || 'any',
            residentKey: document.querySelector('#residentKey').value,
            prfMode: document.querySelector('#prfMode').value,
            origin: location.origin,
          });
        });
      });

      document.querySelector('#clear').addEventListener('click', () => {
        localStorage.removeItem(storageKey);
        setStatus('Cleared.');
        output.textContent = 'Ready.';
      });
    </script>
  </body>
</html>
