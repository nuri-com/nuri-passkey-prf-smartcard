<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nuri Merchant Terminal</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f6f8;
    --panel: #ffffff;
    --ink: #17202a;
    --muted: #657080;
    --line: #d7dce3;
    --accent: #1f7a5a;
    --accent-ink: #ffffff;
    --warn: #9a3412;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { border-bottom: 1px solid var(--line); background: var(--panel); }
  nav { max-width: 1120px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  nav strong { font-size: 17px; }
  nav a { color: var(--muted); text-decoration: none; font-weight: 650; margin-left: 18px; }
  nav a[aria-current="page"] { color: var(--ink); }
  main { max-width: 420px; margin: 0 auto; padding: 28px 20px 40px; }
  .pos { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 22px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .merchant { color: var(--muted); font-weight: 700; font-size: 14px; }
  .amount { font-size: 56px; font-weight: 850; letter-spacing: -1px; margin: 6px 0 0; line-height: 1; }
  .amount .unit { font-size: 22px; font-weight: 700; color: var(--muted); margin-left: 8px; letter-spacing: 0; }
  .pays { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 22px 0 16px; }
  .pad button { border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 10px; padding: 18px 0; font-size: 22px; font-weight: 700; cursor: pointer; }
  .pad button:active { background: #eef1f4; }
  .charge { width: 100%; border: 1px solid var(--accent); background: var(--accent); color: var(--accent-ink); border-radius: 10px; padding: 16px; font: inherit; font-size: 18px; font-weight: 800; cursor: pointer; }
  .charge:disabled { opacity: .5; cursor: default; }
  .status { margin-top: 16px; min-height: 20px; color: var(--muted); text-align: center; }
  .status.bad { color: var(--warn); font-weight: 700; }
</style>
</head>
<body>
<header>
  <nav>
    <strong>Nuri Merchant</strong>
    <div>
      <a href="/terminal" aria-current="page">Terminal</a>
      <a href="/profile">Profile</a>
    </div>
  </nav>
</header>
<main>
  <div class="pos">
    <div class="merchant">Nuri demo coffee</div>
    <div class="amount"><span id="amountView">0</span><span class="unit">sats</span></div>
    <div class="pays">Charges <strong id="target">nuri@cake.cash</strong> · mainnet</div>
    <div class="pad">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="C">C</button><button data-k="0">0</button><button data-k="back">⌫</button>
    </div>
    <button id="charge" class="charge" disabled>Charge</button>
    <div id="status" class="status"></div>
  </div>
</main>
<script type="module">
const $ = (id) => document.getElementById(id);
const MERCHANT_TARGET = 'nuri@cake.cash';
const MERCHANT_NAME = 'Nuri demo coffee';
let digits = '';

function render() {
  const n = Number(digits || '0');
  $('amountView').textContent = n.toLocaleString('en-US');
  $('charge').disabled = n <= 0;
}

function press(k) {
  if (k === 'C') digits = '';
  else if (k === 'back') digits = digits.slice(0, -1);
  else if (/^[0-9]$/.test(k) && digits.length < 9) digits = (digits + k).replace(/^0+/, '');
  render();
}

async function post(path, body) {
  const res = await fetch(path, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || JSON.stringify(data));
  return data;
}

async function charge() {
  const amountSats = Number(digits || '0');
  if (amountSats <= 0) return;
  $('charge').disabled = true;
  $('status').className = 'status';
  $('status').textContent = `Creating checkout for ${amountSats.toLocaleString('en-US')} sats…`;
  try {
    const session = await post('/api/merchant/checkout', {
      amountSats,
      merchantName: MERCHANT_NAME,
      memo: 'Counter payment',
      lightningTarget: MERCHANT_TARGET,
      network: 'mainnet',
    });
    $('status').textContent = 'Forwarding to checkout…';
    location.href = session.checkout_url; // same-tab forward to the approval/pay page
  } catch (error) {
    $('status').className = 'status bad';
    $('status').textContent = error.message;
    $('charge').disabled = false;
  }
}

document.querySelector('.pad').addEventListener('click', (e) => {
  const k = e.target?.dataset?.k;
  if (k) press(k);
});
window.addEventListener('keydown', (e) => {
  if (/^[0-9]$/.test(e.key)) press(e.key);
  else if (e.key === 'Backspace') press('back');
  else if (e.key === 'Enter') charge();
});
$('charge').addEventListener('click', charge);
render();
</script>
</body>
</html>
