<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nuri Checkout</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f4f5f7;
    --panel: #fff;
    --ink: #141b24;
    --muted: #667385;
    --line: #d8dde5;
    --accent: #185c72;
    --good: #0f7a4f;
    --bad: #a52820;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { background: var(--panel); border-bottom: 1px solid var(--line); }
  nav { max-width: 1040px; margin: 0 auto; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
  nav strong { font-size: 17px; }
  nav a { color: var(--muted); text-decoration: none; font-weight: 650; margin-left: 18px; }
  main { max-width: 1040px; margin: 0 auto; padding: 24px 20px 40px; display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 24px; }
  section, aside { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 20px; }
  h1 { margin: 0 0 18px; font-size: 24px; letter-spacing: 0; }
  h2 { margin: 0 0 12px; font-size: 16px; }
  .amount { font-size: 46px; font-weight: 850; letter-spacing: 0; margin: 4px 0 8px; }
  .muted { color: var(--muted); }
  .field { border-top: 1px solid var(--line); padding: 13px 0; }
  .field:first-of-type { border-top: 0; }
  .label { color: var(--muted); font-size: 12px; font-weight: 750; text-transform: uppercase; letter-spacing: .04em; }
  .value { overflow-wrap: anywhere; margin-top: 4px; }
  button { width: 100%; border: 1px solid var(--accent); background: var(--accent); color: white; border-radius: 6px; padding: 13px 15px; font: inherit; font-weight: 800; cursor: pointer; }
  button:disabled { opacity: .55; cursor: default; }
  .ok { color: var(--good); font-weight: 800; }
  .bad { color: var(--bad); font-weight: 800; }
  pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #101820; color: #e8edf2; border-radius: 6px; padding: 14px; font-size: 12px; max-height: 420px; overflow: auto; }
  @media (max-width: 820px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <nav>
    <strong>Nuri Checkout</strong>
    <div>
      <a href="/terminal">Terminal</a>
      <a href="/profile">Profile</a>
    </div>
  </nav>
</header>
<main>
  <section>
    <h1>Payment approval</h1>
    <div class="label">Amount</div>
    <div id="amount" class="amount">-</div>
    <div id="status" class="muted">Loading checkout...</div>
    <div class="field">
      <div class="label">Merchant</div>
      <div id="merchant" class="value">-</div>
    </div>
    <div class="field">
      <div class="label">Invoice</div>
      <div id="invoice" class="value">-</div>
    </div>
    <div class="field">
      <div class="label">Invoice expires</div>
      <div id="invoiceExpires" class="value">-</div>
    </div>
    <div class="field">
      <div class="label">Payment hash</div>
      <div id="paymentHash" class="value">-</div>
    </div>
    <div class="field">
      <div class="label">Package hash signed by card</div>
      <div id="packageHash" class="value">Not signed yet</div>
    </div>
    <p style="margin:18px 0 0"><button id="confirm">Tap card and approve</button></p>
  </section>
  <aside>
    <h2>Proof</h2>
    <div id="proofState" class="muted">Waiting for approval.</div>
    <h2 style="margin-top:18px">Broadcast</h2>
    <div id="broadcastState" class="muted">Not broadcast yet.</div>
    <pre id="out" hidden></pre>
  </aside>
</main>
<script type="module">
const $ = (id) => document.getElementById(id);
const sessionId = new URL(location.href).searchParams.get('id');
let session = null;

async function getJson(path) {
  const res = await fetch(path);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || JSON.stringify(data));
  return data;
}

async function post(path, body) {
  const res = await fetch(path, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || JSON.stringify(data));
  return data;
}

function render(data) {
  session = data;
  $('amount').textContent = `${data.amount_sats} sats`;
  $('merchant').textContent = data.merchant_name;
  $('invoice').textContent = data.invoice;
  $('invoiceExpires').textContent = data.invoice_expires_at || '-';
  $('paymentHash').textContent = data.payment_hash;
  $('packageHash').textContent = data.payment_package_hash32 || 'Not signed yet';
  $('status').textContent = data.status === 'paid_demo' ? 'Approved by card' : `${data.network} checkout`;
  $('status').className = data.status === 'paid_demo' ? 'ok' : 'muted';
  if (data.proof) {
    $('proofState').textContent = 'Card and ASP partials verified; final BIP340 signature verified.';
    $('proofState').className = 'ok';
    $('out').hidden = false;
    $('out').textContent = JSON.stringify(data.proof, null, 2);
    $('confirm').disabled = true;
  }
  if (data.broadcast) {
    const b = data.broadcast;
    const ok = b.claimed_ok ?? 0;
    const total = b.claimable_count ?? 0;
    let txt;
    if (b.skipped) {
      txt = `Proof signed. Broadcast skipped (${b.skipped}). Set FIDO2_BACKUP_PIN and reload to broadcast.`;
    } else if (b.error) {
      txt = `Proof signed. Broadcast error: ${b.error}`;
    } else if (ok > 0) {
      txt = `Proof signed. Broadcast real: ${ok}/${total} Ark VHTLC claimed. Card settled balance went up.`;
    } else {
      txt = `Proof signed. No claimable VHTLC to broadcast right now.`;
    }
    $('broadcastState').textContent = txt;
    $('broadcastState').className = b.skipped || b.error ? 'bad' : 'ok';
    const claimJson = b.claims ? b.claims : null;
    $('out').hidden = false;
    $('out').textContent = JSON.stringify({ proof: data.proof, broadcast: b, claim_json: claimJson }, null, 2);
  }
}

async function load() {
  if (!sessionId) throw new Error('Missing checkout id');
  render(await getJson(`/api/checkout/session?id=${encodeURIComponent(sessionId)}`));
}

async function confirmPayment() {
  $('confirm').disabled = true;
  $('proofState').textContent = 'Waiting for card...';
  try {
    render(await post('/api/checkout/confirm', { sessionId }));
  } catch (error) {
    $('proofState').textContent = error.message;
    $('proofState').className = 'bad';
    $('confirm').disabled = false;
  }
}

$('confirm').addEventListener('click', confirmPayment);
load().catch((error) => {
  $('status').textContent = error.message;
  $('status').className = 'bad';
  $('confirm').disabled = true;
});
</script>
</body>
</html>
