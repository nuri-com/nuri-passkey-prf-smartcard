<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nuri Terminal · Approve</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f6f8;
    --panel: #ffffff;
    --ink: #17202a;
    --muted: #657080;
    --line: #d7dce3;
    --accent: #1f7a5a;
    --accent-ink: #ffffff;
    --warn: #9a3412;
    --sel: #1f7a5a;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { border-bottom: 1px solid var(--line); background: var(--panel); }
  nav { max-width: 1120px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  nav strong { font-size: 17px; }
  nav a { color: var(--muted); text-decoration: none; font-weight: 650; margin-left: 18px; }
  nav a[aria-current="page"] { color: var(--ink); }
  main { max-width: 420px; margin: 0 auto; padding: 28px 20px 40px; }
  .pos { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 22px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .merchant { color: var(--muted); font-weight: 700; font-size: 14px; }
  .amount { font-size: 56px; font-weight: 850; letter-spacing: -1px; margin: 6px 0 0; line-height: 1; }
  .amount .unit { font-size: 22px; font-weight: 700; color: var(--muted); margin-left: 8px; letter-spacing: 0; }
  .pays { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .sec-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin: 20px 0 8px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card-opt { cursor: pointer; border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fff; position: relative; }
  .card-opt.sel { border-color: var(--sel); box-shadow: 0 0 0 2px rgba(31,122,90,.16); }
  .card-opt .chip { width: 26px; height: 19px; border-radius: 4px; background: linear-gradient(135deg,#f4d26a,#c99a2e); margin-bottom: 9px; }
  .card-opt .t { font-weight: 750; font-size: 13px; }
  .card-opt .s { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .card-opt input { position: absolute; opacity: 0; }
  .pin-view { display: flex; justify-content: center; gap: 14px; padding: 12px 0 2px; height: 30px; }
  .pin-view .d { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--line); }
  .pin-view .d.on { background: var(--ink); border-color: var(--ink); }
  .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0 16px; }
  .pad button { border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 10px; padding: 18px 0; font-size: 22px; font-weight: 700; cursor: pointer; }
  .pad button:active { background: #eef1f4; }
  .charge { width: 100%; border: 1px solid var(--accent); background: var(--accent); color: var(--accent-ink); border-radius: 10px; padding: 16px; font: inherit; font-size: 18px; font-weight: 800; cursor: pointer; }
  .charge:disabled { opacity: .5; cursor: default; }
  .stage { text-align: center; margin-top: 18px; }
  .card-anim { font-size: 40px; height: 48px; }
  .card-anim.pulse { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: .8 } 50% { transform: scale(1.12); opacity: 1 } }
  .status { margin-top: 8px; min-height: 20px; color: var(--muted); text-align: center; font-weight: 600; }
  .status.bad { color: var(--warn); } .status.ok { color: var(--accent); } .status.wait { color: #9a6b00; }
  .receipt { margin-top: 14px; border-top: 1px dashed var(--line); padding-top: 12px; font-size: 13px; display: none; }
  .receipt.show { display: block; }
  .receipt .row { display: flex; justify-content: space-between; gap: 12px; margin: 5px 0; }
  .receipt .row span:first-child { color: var(--muted); }
  .receipt .row span:last-child { text-align: right; word-break: break-all; font-variant-numeric: tabular-nums; }
  .hide { display: none; }
  code { font-size: 11px; word-break: break-all; }
</style>
</head>
<body>
<header>
  <nav>
    <strong>Nuri Terminal</strong>
    <div>
      <a href="/terminal">Terminal</a>
      <a href="/checkout" aria-current="page">Approve</a>
      <a href="/profile">Profile</a>
    </div>
  </nav>
</header>
<main>
  <div class="pos">
    <div class="merchant" id="merchant">Merchant</div>
    <div class="amount"><span id="amountView">0</span><span class="unit">sats</span></div>
    <div class="pays">Pays <strong id="memo"></strong> · mainnet</div>

    <div id="payUi">
      <div class="sec-label">Pay with card</div>
      <div class="cards" id="cards">
        <label class="card-opt sel" data-account="nuri">
          <input type="radio" name="account" value="nuri" checked />
          <div class="chip"></div>
          <div class="t">Nuri Card</div>
          <div class="s">card@nuri.com</div>
        </label>
        <label class="card-opt" data-account="pure">
          <input type="radio" name="account" value="pure" />
          <div class="chip"></div>
          <div class="t">Pure Arkade</div>
          <div class="s">no Nuri · card only</div>
        </label>
      </div>

      <div class="sec-label">Enter card PIN</div>
      <div class="pin-view" id="pinView"></div>
      <div class="pad" id="pad">
        <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
        <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
        <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
        <button data-k="C">C</button><button data-k="0">0</button><button data-k="back">⌫</button>
      </div>
      <button id="charge" class="charge" disabled>Tap card &amp; approve</button>
    </div>

    <div class="stage hide" id="stage">
      <div class="card-anim" id="cardAnim">💳</div>
      <div class="status" id="status"></div>
    </div>

    <div class="receipt" id="receipt">
      <div class="row"><span>Status</span><span id="rStatus">—</span></div>
      <div class="row"><span>Card</span><span id="rCard">—</span></div>
      <div class="row"><span>Paid</span><span id="rPaid">—</span></div>
      <div class="row"><span>Ark txid</span><span id="rTxid">—</span></div>
    </div>
    <details style="margin-top:12px"><summary style="cursor:pointer;color:var(--muted);font-size:12px">Raw</summary>
      <pre style="white-space:pre-wrap"><code id="out"></code></pre>
    </details>
  </div>
</main>
<script>
const $ = (id) => document.getElementById(id);
const sessionId = new URL(location.href).searchParams.get('id');
let account = 'nuri';
let pin = '';

async function getJson(path) {
  const res = await fetch(path);
  const data = await res.json();
  if (!res.ok) throw Object.assign(new Error(data.error || res.statusText), { data });
  return data;
}
async function post(path, body) {
  const res = await fetch(path, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw Object.assign(new Error(data.error || res.statusText), { data });
  return data;
}

function renderPin() {
  const dots = Math.min(pin.length, 8);
  let html = '';
  for (let i = 0; i < Math.max(4, dots); i++) html += `<div class="d${i < dots ? ' on' : ''}"></div>`;
  $('pinView').innerHTML = html;
  $('charge').disabled = pin.length < 1;
}
function press(k) {
  if (k === 'C') pin = '';
  else if (k === 'back') pin = pin.slice(0, -1);
  else if (/^[0-9]$/.test(k) && pin.length < 12) pin += k;
  renderPin();
}

function renderSession(data) {
  $('amountView').textContent = Number(data.amount_sats).toLocaleString('en-US');
  $('merchant').textContent = data.merchant_name || 'Merchant';
  $('memo').textContent = data.memo || (data.invoice ? data.invoice.slice(0, 24) + '…' : '');
  if (data.status === 'paid_demo' && data.broadcast) showBroadcast(data.broadcast);
}

function showBroadcast(b) {
  $('payUi').classList.add('hide');
  $('stage').classList.remove('hide');
  $('cardAnim').classList.remove('pulse');
  const ok = b.attempted && !b.error && !b.skipped && /_OK/.test(b.status || '');
  $('cardAnim').textContent = ok ? '✅' : (b.error || b.skipped ? '⚠️' : '💳');
  $('status').textContent = ok ? 'Approved — payment broadcast' : (b.skipped ? `Skipped: ${b.skipped}` : `Declined: ${b.error || 'unknown'}`);
  $('status').className = 'status ' + (ok ? 'ok' : 'bad');
  $('receipt').classList.add('show');
  $('rStatus').textContent = ok ? 'APPROVED' : 'DECLINED';
  $('rCard').textContent = b.account === 'pure' ? 'Pure Arkade' : 'Nuri (card@nuri.com)';
  $('rPaid').textContent = b.final_amount_sats ? `${b.final_amount_sats} sats (funded ${b.funding_amount_sats})` : '—';
  $('rTxid').innerHTML = b.ark_txid ? `<code>${b.ark_txid}</code>` : '—';
  $('out').textContent = JSON.stringify(b, null, 2);
}

async function load() {
  if (!sessionId) throw new Error('Missing checkout id');
  renderSession(await getJson(`/api/checkout/session?id=${encodeURIComponent(sessionId)}`));
}

document.querySelectorAll('.card-opt').forEach((el) => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.card-opt').forEach((o) => o.classList.remove('sel'));
    el.classList.add('sel');
    el.querySelector('input').checked = true;
    account = el.dataset.account;
  });
});

$('pad').addEventListener('click', (e) => { const k = e.target?.dataset?.k; if (k) press(k); });
window.addEventListener('keydown', (e) => {
  if (/^[0-9]$/.test(e.key)) press(e.key);
  else if (e.key === 'Backspace') press('back');
  else if (e.key === 'Enter' && !$('charge').disabled) approve();
});

async function approve() {
  $('charge').disabled = true;
  $('payUi').classList.add('hide');
  $('stage').classList.remove('hide');
  $('cardAnim').textContent = '💳';
  $('cardAnim').classList.add('pulse');
  $('status').textContent = 'Tap and hold your card on the reader…';
  $('status').className = 'status wait';
  try {
    const data = await post('/api/checkout/confirm', { sessionId, pin, account });
    showBroadcast(data.broadcast || { attempted: false, account, error: 'no broadcast' });
  } catch (error) {
    $('cardAnim').classList.remove('pulse');
    $('cardAnim').textContent = '⚠️';
    $('status').textContent = error.message;
    $('status').className = 'status bad';
    $('payUi').classList.remove('hide');
    renderPin();
  }
}

$('charge').addEventListener('click', approve);
renderPin();
load().catch((e) => { $('stage').classList.remove('hide'); $('payUi').classList.add('hide'); $('status').textContent = e.message; $('status').className = 'status bad'; });
</script>
</body>
</html>
